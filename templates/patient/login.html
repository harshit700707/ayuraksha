{% extends "base.html" %}
{% block title %}Patient Login — AyuRaksha{% endblock %}

{% block content %}
<div style="min-height: 75vh; display: flex; align-items: center; justify-content: center; padding: 48px 16px; background: var(--bg);">
  <div class="otp-box">
    <div style="font-size: 48px; margin-bottom: 16px;">👤</div>
    <h2>Patient Login</h2>
    <p style="color: var(--text-muted); font-size: 14.5px; margin-bottom: 32px;">Enter your mobile number to receive a secure OTP via WhatsApp</p>

    <!-- Step 1: Phone -->
    <div id="phoneStep">
      <div class="form-group" style="text-align: left;">
        <label>Mobile Number</label>
        <div style="display: flex; gap: 8px;">
          <div style="padding: 12px 16px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-weight: 800; white-space: nowrap; display: flex; align-items: center; color: var(--text-muted);">+91</div>
          <input type="tel" id="phoneInput" placeholder="Enter 10-digit number" maxlength="10" style="flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; font-family: var(--font); outline: none; transition: all 0.2s ease;"/>
        </div>
      </div>
      <button class="btn btn-primary btn-block btn-lg" id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>
      <p style="margin-top: 16px; font-size: 12.5px; color: var(--text-muted);">A validation message will be dispatched immediately.</p>
      <div style="margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px;">
        <button class="btn btn-outline btn-block btn-sm" onclick="document.getElementById('phoneInput').value='9876543210'; sendOTP();">🔑 Quick Demo Login</button>
      </div>
    </div>

    <!-- Step 2: OTP -->
    <div id="otpStep" style="display: none;">
      <div class="alert alert-success" id="otpSentMsg" style="margin-bottom: 20px;"></div>
      <div class="form-group" style="text-align: left;">
        <label>Enter Verification Code</label>
        <input type="text" class="otp-input" id="otpInput" placeholder="••••••" maxlength="6"
          oninput="this.value=this.value.replace(/\D/g,'')"
          onkeypress="if(event.key==='Enter')verifyOTP()"
          style="width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; font-size: 24px; font-weight: 800; letter-spacing: 6px; outline: none; transition: border-color 0.2s;"/>
      </div>
      <button class="btn btn-primary btn-block btn-lg" id="verifyBtn" onclick="verifyOTP()">Verify & Login</button>
      <button class="btn btn-outline btn-block btn-sm" style="margin-top: 12px;" onclick="goBackToPhone()">← Change Number</button>
      <div id="resendTimer" style="margin-top: 16px; font-size: 13px; color: var(--text-muted); font-weight: 600;"></div>
      <div style="margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px;">
        <button class="btn btn-outline btn-block btn-sm" onclick="document.getElementById('otpInput').value='123456'; verifyOTP();">🔑 Quick Verify Code</button>
      </div>
    </div>
  </div>
</div>
<script>
document.getElementById('phoneInput').addEventListener('focus', function() {
  this.style.borderColor = 'var(--primary-light)';
  this.style.boxShadow = '0 0 0 4px rgba(20, 184, 166, 0.12)';
});
document.getElementById('phoneInput').addEventListener('blur', function() {
  this.style.borderColor = 'var(--border)';
  this.style.boxShadow = 'none';
});
document.getElementById('otpInput').addEventListener('focus', function() {
  this.style.borderColor = 'var(--primary)';
  this.style.boxShadow = '0 0 0 4px rgba(15, 118, 110, 0.12)';
});
document.getElementById('otpInput').addEventListener('blur', function() {
  this.style.borderColor = 'var(--border)';
  this.style.boxShadow = 'none';
});
</script>

<script>
let currentPhone = '';
let resendCountdown = null;

async function sendOTP() {
  const phone = document.getElementById('phoneInput').value.trim();
  if (!/^[6-9][0-9]{9}$/.test(phone)) { showToast('Please enter a valid 10-digit mobile number', 'error'); return; }

  currentPhone = phone;
  const btn = document.getElementById('sendOtpBtn');
  btn.textContent = 'Sending...'; btn.disabled = true;

  const res = await apiCall('POST', '/auth/patient/send-otp', { phone });
  btn.textContent = 'Send OTP'; btn.disabled = false;

  if (res.success) {
    document.getElementById('phoneStep').style.display = 'none';
    document.getElementById('otpStep').style.display = 'block';
    document.getElementById('otpSentMsg').textContent = `OTP sent to +91 ${phone} via WhatsApp`;
    startResendTimer();
  } else {
    showToast(res.message || 'Failed to send OTP', 'error');
  }
}

async function verifyOTP() {
  const otp = document.getElementById('otpInput').value.trim();
  if (otp.length !== 6) { showToast('Please enter 6-digit OTP', 'error'); return; }

  const btn = document.getElementById('verifyBtn');
  btn.textContent = 'Verifying...'; btn.disabled = true;

  const res = await apiCall('POST', '/auth/patient/verify-otp', { phone: currentPhone, otp });
  btn.textContent = 'Verify & Login'; btn.disabled = false;

  if (res.success) {
    Auth.setToken(res.data.token);
    Auth.setRole('patient');
    Auth.setUser(res.data.user);
    showToast('Login successful!', 'success');
    setTimeout(() => window.location = '/patient/dashboard', 800);
  } else {
    showToast(res.message || 'Invalid OTP', 'error');
  }
}

function goBackToPhone() {
  document.getElementById('phoneStep').style.display = 'block';
  document.getElementById('otpStep').style.display = 'none';
  document.getElementById('otpInput').value = '';
  if (resendCountdown) clearInterval(resendCountdown);
}

function startResendTimer() {
  let t = 60;
  const el = document.getElementById('resendTimer');
  resendCountdown = setInterval(() => {
    el.textContent = `Resend OTP in ${t}s`;
    t--;
    if (t < 0) {
      clearInterval(resendCountdown);
      el.innerHTML = '<button onclick="resendOTP()" style="background:none;border:none;color:var(--primary);font-weight:700;cursor:pointer;font-size:13px">Resend OTP</button>';
    }
  }, 1000);
}

function resendOTP() { goBackToPhone(); document.getElementById('phoneInput').value = currentPhone; sendOTP(); }
</script>
{% endblock %}
