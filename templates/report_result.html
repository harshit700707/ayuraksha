<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Health Analysis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#edf6ff,#dff6ff);
            font-family:Arial;
            min-height:100vh;
        }

        .result-card{
            margin-top:50px;
            border:none;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.1);
            padding:30px;
            background:white;
        }

        .title{
            color:#0077b6;
            font-weight:bold;
        }

        .result-box{
            background:#f8fbff;
            padding:25px;
            border-radius:15px;
            white-space:pre-wrap;
            line-height:1.8;
            margin-top:20px;
            border-left:5px solid #0077b6;
        }

        .back-btn{
            margin-top:25px;
            background:#0077b6;
            border:none;
        }

        .back-btn:hover{
            background:#023e8a;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card result-card">

        <h1 class="title">AI Health Analysis</h1>

        <div class="result-box">
            {{ result }}
        </div>

        <a href="/" class="btn btn-primary back-btn">
            Upload Another Report
        </a>

    </div>

</div>

</body>
</html>
