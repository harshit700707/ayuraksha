{% extends "base.html" %}
{% block title %}AI Report Analysis Result — AyuRaksha{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 48px auto; padding: 0 20px;">
  <div class="card animate-slide">
    <div style="text-align: center; margin-bottom: 32px;">
      <h2 style="font-family: var(--font-display); font-size: 32px; color: var(--primary); font-weight: 800; letter-spacing: -0.5px;">📋 AI Report Analysis</h2>
      <p style="color: var(--text-muted); margin-top: 6px;">Understandable translation of your uploaded medical records.</p>
    </div>

    <!-- AI Result Box -->
    <div style="background: var(--surface2); padding: 32px; border-radius: var(--radius); border-left: 5px solid var(--primary); white-space: pre-wrap; line-height: 1.8; font-size: 15.5px; color: var(--text); box-shadow: var(--shadow-sm); margin-bottom: 32px;">{{ result }}</div>

    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
      <a href="/api/lab/upload-report" class="btn btn-primary" style="flex: 1; min-width: 220px;">
        ⚡ Upload Another Report
      </a>
      <a href="/" class="btn btn-outline" style="flex: 1; min-width: 220px;">
        🏠 Return to Homepage
      </a>
    </div>
  </div>
</div>
{% endblock %}
