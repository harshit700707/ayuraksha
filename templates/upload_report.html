<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuRaksha AI Analysis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right,#e0f7fa,#f1f8ff);
            font-family: Arial, sans-serif;
            min-height:100vh;
        }

        .main-card{
            margin-top:70px;
            border:none;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.1);
            overflow:hidden;
        }

        .left-side{
            background: linear-gradient(to bottom right,#00b4d8,#0077b6);
            color:white;
            padding:50px;
        }

        .left-side h1{
            font-weight:bold;
            font-size:42px;
        }

        .right-side{
            padding:50px;
            background:white;
        }

        .upload-btn{
            background:#0077b6;
            border:none;
            padding:12px;
            font-weight:bold;
        }

        .upload-btn:hover{
            background:#023e8a;
        }

        .form-control{
            padding:12px;
            border-radius:12px;
        }

        .feature-box{
            margin-top:20px;
            padding:15px;
            background:rgba(255,255,255,0.15);
            border-radius:15px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card main-card">

        <div class="row g-0">

            <div class="col-md-5 left-side">

                <h1>AyuRaksha</h1>

                <p class="mt-4">
                    AI-powered healthcare report analysis system.
                </p>

                <div class="feature-box">
                    ✔ Smart OCR Detection
                </div>

                <div class="feature-box">
                    ✔ AI Health Insights
                </div>

                <div class="feature-box">
                    ✔ Fast Medical Analysis
                </div>

            </div>

            <div class="col-md-7 right-side">

                <h2 class="mb-4">Upload Medical Report</h2>

                <form action="/api/lab/upload-report" method="POST" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Select Language</label>

                        <select class="form-select" name="language">

                            <option value="English">English</option>
                            <option value="Hindi">Hindi</option>

                        </select>
                    </div>

                    <div class="mb-4">

                        <label class="form-label">Upload Report Image</label>

                        <input type="file" class="form-control" name="report">

                    </div>

                    <button type="submit" class="btn btn-primary w-100 upload-btn">
                        Analyze Report
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
